name: Release

# 打 tag（如 v1.0.0）时触发：多架构构建并把二进制附到 GitHub Release。
# 二进制构建逻辑复用 build.yml，保证与 CI 产出一致。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {} # 允许手动触发（仅构建，不发布）

permissions:
  contents: write # 发布 Release 需要

jobs:
  build:
    name: Build (multi-arch)
    uses: ./.github/workflows/build.yml

  release:
    name: Publish Release
    needs: build
    # 仅 tag 推送时才真正发布；手动触发只构建不发布
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true # 把所有矩阵产物合并到同一目录

      - name: List artifacts
        run: ls -lh dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*
          generate_release_notes: true # 自动生成 changelog
          fail_on_unmatched_files: true
