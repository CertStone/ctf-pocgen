name: Build

# 可复用的多架构构建工作流。被 ci.yml 与 release.yml 调用（workflow_call），
# 也可单独手动触发。产出 6 个平台的二进制并上传为 workflow artifact。
#
# 触发方负责各自的附加动作：
#   - ci.yml：附加 vet/fmt/test，构建结果作为 artifact 留存
#   - release.yml：构建结果附到 GitHub Release
on:
  workflow_call: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 笛卡尔积：3 系统 × 2 架构 = 6 个目标
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: '0' # 纯 Go 交叉编译，无需 C 工具链
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          ext=""
          if [ "${GOOS}" = "windows" ]; then ext=".exe"; fi
          out="dist/ctf-pocgen-${GOOS}-${GOARCH}${ext}"
          go build -trimpath -ldflags="-s -w" -o "$out" .
          echo "构建产物: $out"
          ls -lh "$out"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          # 同一次构建内名称唯一；release.yml 会用 merge-multiple 汇总
          name: ctf-pocgen-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 14 # CI 产物保留 14 天，避免堆积
