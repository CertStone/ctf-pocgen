name: CI

# main 分支的每次 commit / PR 合并都触发：
#   1) 质量检查（vet / 格式 / 测试）
#   2) 多架构构建（调用 build.yml），二进制作为 workflow artifact 留存
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Vet & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Verify formatting
        run: |
          # gofmt -l 输出非空即表示有未格式化文件
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::以下文件未用 gofmt 格式化:"
            echo "$out"
            exit 1
          fi

      - name: Test
        run: go test -v ./...

  build:
    name: Build (multi-arch)
    needs: check
    uses: ./.github/workflows/build.yml
